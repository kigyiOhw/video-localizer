<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Video-Localizer{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css?v={{ version }}">
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
    {% block head %}{% endblock %}
</head>
<body hx-boost="true">
    <nav class="navbar">
        <div class="nav-top">
            <a href="/" class="nav-brand">🎬 Video-Localizer</a>
            <span class="nav-version">v{{ version }}</span>
            <a href="/docs" target="_blank" class="nav-aux">API 文档</a>
        </div>
        <div class="nav-tabs">
            <a href="/" class="nav-tab" data-page="home">🏠 首页</a>
            <a href="/tools" class="nav-tab" data-page="tools">🔧 媒体工具</a>
            <a href="/workshop" class="nav-tab" data-page="workshop">🤖 AI 工坊</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Video-Localizer &copy; 2026 — AI-powered subtitle &amp; dubbing toolkit</p>
    </footer>

    <script>
    // 根据当前路径高亮导航标签（子页面高亮父级 tab）
    (function() {
        var path = window.location.pathname;
        // 子页面 → 父级 tab 映射
        var childToParent = {
            '/probe': 'tools', '/extract': 'tools', '/subtitle': 'tools',
            '/track': 'tools', '/audio': 'tools',
            '/asr': 'workshop', '/translate': 'workshop', '/pipeline': 'workshop',
        };
        var activePage = childToParent[path] || path.replace(/^\//, '') || 'home';
        if (activePage === '') activePage = 'home';
        var tabs = document.querySelectorAll('.nav-tab');
        tabs.forEach(function(tab) {
            if (tab.getAttribute('data-page') === activePage) {
                tab.classList.add('active');
            }
        });
    })();
    </script>
</body>
</html>
