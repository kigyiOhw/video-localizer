<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Video-Localizer{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
    {% block head %}{% endblock %}
</head>
<body hx-boost="true">
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/">🎬 Video-Localizer</a>
            <span class="nav-version">v{{ version }}</span>
        </div>
        <div class="nav-links">
            <a href="/docs" target="_blank">API 文档</a>
            <a href="/api/health">健康检查</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Video-Localizer &copy; 2025 — AI-powered subtitle &amp; dubbing toolkit</p>
    </footer>
</body>
</html>
